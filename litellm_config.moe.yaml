# LiteLLM sole-proxy config for Qwen3.6-35B-A3B (MoE) on the A10.
#
# Three REAL model names against ONE vLLM instance. They differ ONLY in
# extra_body.chat_template_kwargs, which LiteLLM passes through to vLLM and the
# Qwen3.6 chat_template reads per request (verified in
# QuantTrio/Qwen3.6-*/chat_template.jinja):
#   - enable_thinking   whether THIS generation reasons (default ON; leave it)
#   - preserve_thinking whether PRIOR turns' reasoning stays in context (default OFF)
#
# One running backend serves all three flavors interleaved. The bare name equals
# vLLM's --served-model-name (qwen3.6-35b-a3b); -preserve / -nothink are the two
# thinking variants. The dense stack uses litellm_config.yaml (qwen3.6-27b).
#
#   qwen3.6-35b-a3b           DEFAULT    strip -- thinking shown this turn, not carried
#   qwen3.6-35b-a3b-preserve  RARE       keep -- carry prior <think> across turns
#   qwen3.6-35b-a3b-nothink   BACKGROUND     -- no reasoning pass (titles/summaries)

model_list:
  - model_name: qwen3.6-35b-a3b
    litellm_params:
      model: os.environ/LITELLM_VLLM_MODEL
      api_base: os.environ/LITELLM_VLLM_API_BASE
      api_key: dummy
      extra_body:
        chat_template_kwargs: { preserve_thinking: false }
    model_info:                       # advertise so Claude Code sizes max_tokens to it, else it defaults to
      max_output_tokens: 16384        # 32000 -- which + the ~32k system prompt exceeds --max-model-len
  - model_name: qwen3.6-35b-a3b-preserve
    litellm_params:
      model: os.environ/LITELLM_VLLM_MODEL
      api_base: os.environ/LITELLM_VLLM_API_BASE
      api_key: dummy
      extra_body:
        chat_template_kwargs: { preserve_thinking: true }
    model_info:
      max_output_tokens: 16384
  - model_name: qwen3.6-35b-a3b-nothink
    litellm_params:
      model: os.environ/LITELLM_VLLM_MODEL
      api_base: os.environ/LITELLM_VLLM_API_BASE
      api_key: dummy
      extra_body:
        chat_template_kwargs: { enable_thinking: false, preserve_thinking: false }
    model_info:
      max_output_tokens: 16384

litellm_settings:
  # Wake-on-request + idle-stop live in litellm_callbacks.start_background_tasks
  # (a startup hook that appends a CustomLogger to litellm.callbacks). NOT
  # litellm_settings.callbacks: LiteLLM's config-string resolver only matches
  # built-in integration names, so a custom `module.handler` string is a silent
  # no-op. The handler overrides async_pre_call_hook (wake, both endpoints) and
  # async_pre_call_deployment_hook (preserve-thinking round-trip); see
  # litellm_callbacks.py.
  # No master_key -> auth is OFF and :4000 is bound 0.0.0.0, so any network host
  # can call the proxy (operator's explicit choice; see README Security).
  # open-webui and the bench need no API key; Claude Code sends a placeholder token.
  drop_params: true                       # drop Claude Code params vLLM rejects -> no 400s
  request_timeout: 600                    # generous; cold wake happens in the middleware
  num_workers: 1                          # one idle-watcher, one wake-lock owner
