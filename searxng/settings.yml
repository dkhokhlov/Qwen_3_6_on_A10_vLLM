# SearXNG settings for LiteLLM websearch_interception. Mounted read-only into the
# searxng container by docker-compose.{,moe.}yaml. Enables the JSON output format
# (LiteLLM's searxng provider queries ?format=json -- JSON is OFF by default for
# security on public instances) and disables the bot limiter so LiteLLM's programmatic
# queries aren't blocked. DuckDuckGo (the forgiving workhorse) is on via
# use_default_settings; Brave is disabled below (it 429s under programmatic load).
use_default_settings: true
server:
  bind_address: 0.0.0.0
  limiter: false          # internal-only; LiteLLM is a trusted programmatic client
  # NOTE: SearXNG still logs a one-shot startup warning
  # "X-Forwarded-For nor X-Real-IP header is set!" from searx.botdetection even with
  # limiter:false (it inspects proxy headers at init). Benign -- the limiter is off,
  # so per-query rate limiting never fires and the websearch_interception results
  # return fine. SearXNG also emits no per-request access log to stdout, so absence
  # of /search lines is expected, not a sign the queries didn't land.
  image_proxy: false
  public_instance: false
  secret_key: "21west-qwen-searxng-local-7f3a9c4e1b8d2056a4e7c9f1d2b3a486"  # local session-signing key (not a credential)
search:
  formats: [html, json]   # JSON is what LiteLLM reads; html kept for the healthcheck + browser
  safe_search: 0
# Brave (a default engine) 429s under programmatic load (suspended_time=180) and only
# adds log noise -- DuckDuckGo returns results where Brave gets rate-limited. Disable
# Brave so SearXNG stops retrying it. Other default engines (Google, Bing, Wikipedia, ...)
# remain via use_default_settings; this entry merges into the defaults by name.
engines:
  - name: brave
    disabled: true
