services:
  vllm:
    image: vllm/vllm-openai:nightly@sha256:9fe761ad1e8258a5e8f1c28243b1567c19b0a78e3a909c72611fdd1771f0f966   # matches docker-compose.moe.yaml — one vLLM version across both stacks
    container_name: vllm-qwen
    gpus: all
    ports:
      - "0.0.0.0:8000:8000"   # metrics + harness endpoint (overhead testing); chat still via the proxy (:4000)
    ipc: host
    shm_size: 32g
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: /root/.cache/huggingface
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      # Reduce CUDA fragmentation on a memory-tight GPU.
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    volumes:
      # Whole HF cache so the snapshot -> ../../blobs symlinks resolve; model served by repo id.
      - /home/owner/.cache/huggingface:/root/.cache/huggingface:ro
      - vllm_cache:/root/.cache/vllm
    command: >
      --model QuantTrio/Qwen3.6-27B-AWQ
      --served-model-name qwen3.6-27b
      --language-model-only
      --host 0.0.0.0 --port 8000
      --tensor-parallel-size 1
      --gpu-memory-utilization 0.97
      --max-model-len 64000
      --kv-cache-dtype fp8
      --mamba-cache-dtype float16
      --mamba-ssm-cache-dtype float16
      --max-num-seqs 1
      --max-num-batched-tokens 1024
      --enforce-eager
      --enable-prefix-caching
      --enable-auto-tool-choice
      --tool-call-parser qwen3_xml
      --reasoning-parser qwen3
      --trust-remote-code
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/health\").status==200 else 1)'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 180s
    restart: unless-stopped   # crash (e.g. OOM) auto-restarts; engine-API stop (idle) still
                              # sticks; wake-on-request (ensure_up) backstops per request

  # docker-sock-proxy: holds the root-equivalent Docker socket so LiteLLM doesn't.
  # HAProxy whitelist -> POST /containers/<name>/{start,stop} + GET /_ping ONLY;
  # create/delete/exec/images/secrets/volumes/networks all return 403. Internal
  # network only (no host port); litellm is its sole peer. See litellm_callbacks.py.
  docker-sock-proxy:
    image: tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476   # Docker Hub (GHCR denied w/o auth); HAProxy 3.2.4, built 2025-12-16
    container_name: docker-sock-proxy-qwen
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # rw: HAProxy connect()s the UDS; the proxy IS the trust boundary
    environment:
      POST: "1"
      ALLOW_START: "1"
      ALLOW_STOP: "1"
      CONTAINERS: "0"        # no list/inspect/create/delete
      EVENTS: "0"            # revoke upstream default (info leak)
      VERSION: "0"           # revoke upstream default
      PING: "1"              # keep: backs the healthcheck
      LOG_LEVEL: info
    networks:
      - docker-api           # internal-only; NOT on the default network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # SearXNG: self-hosted meta-search (DuckDuckGo engine) backing LiteLLM's
  # websearch_interception. Keyless. On the DEFAULT network (needs internet egress to
  # reach DuckDuckGo -- NOT the internal docker-api net); litellm reaches it as
  # http://searxng:8080. settings.yml enables the JSON output format LiteLLM queries
  # (?format=json, off by default) and disables the bot limiter for programmatic access.
  searxng:
    image: searxng/searxng@sha256:aaf56bb5ad737d48a8a375778d42eb4ab1757231e6b1eb7980e71d8dd5bdf0de   # :latest as of 2026-07-12 (keyless DDG meta-search backing websearch_interception)
    container_name: searxng-qwen
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- 'http://localhost:8080/' >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # LiteLLM sole proxy: Anthropic<->OpenAI translation + three model names
  # (bare/-preserve/-nothink), and owns the vllm lifecycle (wake-on-request,
  # idle-stop). See litellm_config.yaml + litellm_callbacks.py.
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: vllm-litellm
    ports:
      - "0.0.0.0:4000:4000"   # LAN-accessible: remote hosts drive the proxy (see README Security)
    environment:
      LITELLM_VLLM_MODEL: hosted_vllm/qwen3.6-27b
      LITELLM_VLLM_API_BASE: http://vllm:8000/v1
      BACKEND_CONTAINER: vllm-qwen
      BACKEND_URL: http://vllm:8000
      DOCKER_API_BASE: http://docker-sock-proxy:2375   # Engine API via the whitelisted sidecar (no raw socket mount)
      IDLE_SECONDS: "${VLLM_IDLE_SECONDS:-900}"
      POLL_SECONDS: "${VLLM_POLL_SECONDS:-10}"
      WAKE_TIMEOUT_SECONDS: "${VLLM_WAKE_TIMEOUT:-240}"
      LITELLM_WORKER_STARTUP_HOOKS: litellm_callbacks:start_background_tasks
      PYTHONPATH: /app
      CLAUDE_QWEN_MAX_TOKENS_CAP: "8192"   # server-side clamp (dense 64k ctx): PCT80 -> cap <= 12800
      CLAUDE_QWEN_INJECT_STREAMED_USAGE: "1"   # preflight /tokenize -> message_start.input_tokens (auto-compact)
      SEARXNG_API_BASE: http://searxng:8080   # SearXNG instance for websearch_interception (searxng provider)
    volumes:
      - ./litellm_config.yaml:/app/litellm_config.yaml:ro
      - ./litellm_callbacks.py:/app/litellm_callbacks.py:ro
    command: --config /app/litellm_config.yaml --port 4000
    networks:
      - default      # reach vllm:8000 + open-webui; publish :4000
      - docker-api   # reach docker-sock-proxy only
    depends_on:
      - docker-sock-proxy
      - searxng
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:4000/health/liveliness\").status==200 else 1)'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: anything
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - litellm
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8080/health\").status==200 else 1)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

volumes:
  open-webui-data:
  vllm_cache:

networks:
  docker-api:
    internal: true   # no host port, no egress; the proxy + litellm are its only members