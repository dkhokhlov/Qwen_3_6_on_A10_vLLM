version: '3.8'

services:
  trtllm:
    image: nvcr.io/nvidia/tensorrt-llm/release:1.3.0rc20   # Update to latest
    container_name: trtllm-qwen
    runtime: nvidia
    gpus: all
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./trt_models:/models
    shm_size: 32g
    ulimits:
      memlock: -1
      stack: 67108864
    command: >
      bash -c '
        huggingface-cli download Qwen/Qwen3.6-27B --local-dir /models/Qwen3.6-27B &&
        trtllm-serve /models/Qwen3.6-27B 
          --port 8000 
          --max-batch-size 8 
          --max-num-tokens 131072 
          --kv-cache-free-gpu-mem-fraction 0.80 
          --use-fp8-kv-cache 
          --use-paged-context-fmha 
          --enable-block-reuse
      '

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE=http://trtllm:8000/v1
      - OPENAI_API_KEY=anything   # TRT-LLM doesn't require real key
    depends_on:
      - trtllm
    restart: unless-stopped

volumes:
  open-webui-data:
